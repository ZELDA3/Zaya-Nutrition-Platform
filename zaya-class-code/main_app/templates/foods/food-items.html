{% extends "base.html" %}

{% block content %}
<h1 class="text-center my-5"><span class="border-bottom border-success border-3">Our Meals</span></h1>

<div class="meal-grid">
    {% for food in foods %}
    <div class="meal-card">
        <div class="meal-image">
            <img src="/media/{{food.image}}" alt="{{food.name}}">
        </div>
        <div class="meal-body">
            <h5>{{food.name}}</h5>
            <p class="meal-cals">{{food.calories}} kcal</p>
            <p class="meal-ingredients">{{food.ingredients|truncatechars:60}}</p>
            <a href="/plans/" class="btn-zaya-sm">Add To Plan</a>
        </div>
    </div>
    {% endfor %}
</div>

<style>
    .meal-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
        padding-bottom: 50px;
    }
    .meal-card {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        transition: 0.4s ease;
        border-bottom: 5px solid var(--zaya-green); /* Border bottom applied */
    }
    .meal-card:hover {
        transform: translateY(-10px); /* Hover applied */
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }
    .meal-image img {
        width: 100%;
        height: 220px;
        object-fit: cover;
    }
    .meal-body {
        padding: 20px;
    }
    .btn-zaya-sm {
        background: var(--zaya-green);
        color: white;
        text-decoration: none;
        padding: 8px 15px;
        display: inline-block;
        border-radius: 5px;
        font-size: 0.9rem;
    }
</style>
{% endblock %}
